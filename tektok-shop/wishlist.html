<!DOCTYPE html>
<html lang="id" class="">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Bang IB Shop - Wishlist</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script>tailwind.config = { darkMode: 'class' }</script>
</head>
<body class="bg-gray-50 dark:bg-gray-900 min-h-screen">

  <nav class="bg-white dark:bg-gray-800 shadow sticky top-0 z-40 border-b-2 border-green-500">
    <div class="max-w-7xl mx-auto px-4 py-3 flex items-center justify-between gap-4">
      <a href="shop.html" class="text-xl font-extrabold text-green-600 dark:text-green-400">🛍️ Bang IB Shop</a>
      <div class="flex items-center gap-3">
        <span id="nav-user" class="text-sm text-gray-600 dark:text-gray-300 hidden sm:block"></span>
        <a href="shop.html" class="text-sm text-gray-600 dark:text-gray-300 hover:text-green-600 transition hidden sm:block">🏪 Toko</a>
        <a href="cart.html" class="relative">
          <span class="text-2xl">🛒</span>
          <span id="cart-badge" class="hidden absolute -top-1 -right-1 bg-red-500 text-white text-xs w-5 h-5 rounded-full flex items-center justify-center font-bold">0</span>
        </a>
        <button onclick="toggleDark()" id="dark-toggle" class="text-xl hover:scale-110 transition">🌙</button>
        <button onclick="Auth.logout()" class="text-sm text-red-400 hover:text-red-600 transition">Keluar</button>
      </div>
    </div>
  </nav>

  <main class="max-w-7xl mx-auto px-4 py-8">
    <h1 class="text-2xl font-bold text-gray-800 dark:text-white mb-6">❤️ Wishlist Saya</h1>
    <div id="wishlist-grid" class="grid grid-cols-2 sm:grid-cols-3 lg:grid-cols-4 gap-5"></div>
  </main>

  <script src="js/utils.js"></script>
  <script src="js/auth.js"></script>
  <script src="js/products.js"></script>
  <script>
    async function initWishlist() {
      Utils.applyDark();
      if (!Utils.requireAuth()) return;
      await loadProducts();
      renderNavUser();
      Utils.updateCartBadge();
      document.getElementById('dark-toggle').textContent = Utils.isDark() ? '☀️' : '🌙';

      const wishIds = Utils.getWishlist();
      const grid = document.getElementById('wishlist-grid');

      if (wishIds.length === 0) {
        grid.innerHTML = `
          <div class="col-span-full text-center py-20">
            <div class="text-6xl mb-4">🤍</div>
            <p class="text-gray-400 text-lg">Wishlist kamu masih kosong.</p>
            <a href="shop.html" class="mt-4 inline-block bg-green-600 text-white px-6 py-2 rounded-xl hover:bg-green-700 transition">Jelajahi Produk</a>
          </div>`;
        return;
      }

      const products = allProducts.filter(p => wishIds.includes(p.id));
      grid.innerHTML = products.map(renderProductCard).join('');
    }
    initWishlist();
  </script>
</body>
</html>
