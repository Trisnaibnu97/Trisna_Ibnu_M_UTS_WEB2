<!DOCTYPE html>
<html lang="id" class="">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Bang IB Shop - Checkout</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script>tailwind.config = { darkMode: 'class' }</script>
</head>
<body class="bg-gray-50 dark:bg-gray-900 min-h-screen">

  <nav class="bg-white dark:bg-gray-800 shadow sticky top-0 z-40 border-b-2 border-green-500">
    <div class="max-w-7xl mx-auto px-4 py-3 flex items-center justify-between">
      <a href="shop.html" class="text-xl font-extrabold text-green-600 dark:text-green-400">🛍️ Bang IB Shop</a>
      <div class="flex items-center gap-3">
        <span id="nav-user" class="text-sm text-gray-600 dark:text-gray-300 hidden sm:block"></span>
        <a href="cart.html" class="relative">
          <span class="text-2xl">🛒</span>
          <span id="cart-badge" class="hidden absolute -top-1 -right-1 bg-red-500 text-white text-xs w-5 h-5 rounded-full flex items-center justify-center font-bold">0</span>
        </a>
        <button onclick="toggleDark()" id="dark-toggle" class="text-xl hover:scale-110 transition">🌙</button>
      </div>
    </div>
  </nav>

  <main class="max-w-6xl mx-auto px-4 py-8">
    <h1 class="text-2xl font-bold text-gray-800 dark:text-white mb-6">💳 Checkout</h1>

    <div class="grid lg:grid-cols-3 gap-8">

      <!-- Kiri: Form + Ongkir -->
      <div class="lg:col-span-2 space-y-5">

        <!-- Data Pengiriman -->
        <div class="bg-white dark:bg-gray-800 rounded-2xl shadow p-6">
          <h2 class="text-base font-bold text-gray-800 dark:text-white mb-4">📍 Data Pengiriman</h2>
          <form id="checkout-form" class="space-y-4">
            <div>
              <label class="block text-sm font-medium text-gray-700 dark:text-gray-300 mb-1">Nama Penerima</label>
              <input id="c-name" type="text" required placeholder="Nama lengkap"
                class="w-full px-4 py-3 rounded-xl border border-gray-200 dark:border-gray-600 dark:bg-gray-700 dark:text-white focus:outline-none focus:ring-2 focus:ring-green-400 transition">
            </div>
            <div>
              <label class="block text-sm font-medium text-gray-700 dark:text-gray-300 mb-1">Alamat Lengkap</label>
              <textarea id="c-address" required rows="2" placeholder="Jl. Contoh No. 1, Kelurahan, Kecamatan..."
                class="w-full px-4 py-3 rounded-xl border border-gray-200 dark:border-gray-600 dark:bg-gray-700 dark:text-white focus:outline-none focus:ring-2 focus:ring-green-400 transition resize-none"></textarea>
            </div>
            <div class="grid grid-cols-2 gap-4">
              <div>
                <label class="block text-sm font-medium text-gray-700 dark:text-gray-300 mb-1">No. HP</label>
                <input id="c-phone" type="tel" required placeholder="08xxxxxxxxxx"
                  class="w-full px-4 py-3 rounded-xl border border-gray-200 dark:border-gray-600 dark:bg-gray-700 dark:text-white focus:outline-none focus:ring-2 focus:ring-green-400 transition">
              </div>
              <div>
                <label class="block text-sm font-medium text-gray-700 dark:text-gray-300 mb-1">Kota Tujuan</label>
                <select id="ship-dest"
                  class="w-full px-4 py-3 rounded-xl border border-gray-200 dark:border-gray-600 dark:bg-gray-700 dark:text-white focus:outline-none focus:ring-2 focus:ring-green-400 transition">
                  <option value="">-- Pilih Kota --</option>
                </select>
              </div>
            </div>
          </form>
        </div>

        <!-- Pilih Kurir & Ongkir -->
        <div class="bg-white dark:bg-gray-800 rounded-2xl shadow p-6">
          <h2 class="text-base font-bold text-gray-800 dark:text-white mb-4">🚚 Pilih Kurir & Ongkir</h2>

          <div class="grid grid-cols-2 gap-4 mb-4">
            <div>
              <label class="block text-sm font-medium text-gray-700 dark:text-gray-300 mb-1">Kota Asal Toko</label>
              <select id="ship-origin"
                class="w-full px-3 py-2.5 rounded-xl border border-gray-200 dark:border-gray-600 dark:bg-gray-700 dark:text-white focus:outline-none focus:ring-2 focus:ring-green-400 text-sm transition">
                <option value="">-- Pilih Kota --</option>
              </select>
            </div>
            <div>
              <label class="block text-sm font-medium text-gray-700 dark:text-gray-300 mb-1">Berat Paket (kg)</label>
              <input id="ship-weight" type="number" min="0.1" step="0.1" value="1"
                class="w-full px-3 py-2.5 rounded-xl border border-gray-200 dark:border-gray-600 dark:bg-gray-700 dark:text-white focus:outline-none focus:ring-2 focus:ring-green-400 text-sm transition">
            </div>
          </div>

          <div id="ship-results" class="text-sm text-gray-400 py-2">
            Pilih kota asal dan tujuan untuk melihat ongkir.
          </div>
        </div>

      </div>

      <!-- Kanan: Ringkasan -->
      <div class="lg:col-span-1">
        <div class="bg-white dark:bg-gray-800 rounded-2xl shadow p-6 sticky top-24">
          <h2 class="text-base font-bold text-gray-800 dark:text-white mb-4">🧾 Ringkasan Pesanan</h2>
          <div id="order-summary" class="space-y-2 text-sm text-gray-600 dark:text-gray-300 mb-4"></div>

          <div class="border-t dark:border-gray-700 pt-3 space-y-2 text-sm">
            <div class="flex justify-between text-gray-600 dark:text-gray-300">
              <span>Subtotal</span>
              <span id="summary-subtotal">-</span>
            </div>
            <div class="flex justify-between text-gray-600 dark:text-gray-300">
              <span>Ongkos Kirim</span>
              <span id="summary-shipping" class="text-orange-500">Pilih kurir</span>
            </div>
            <div class="flex justify-between font-bold text-gray-800 dark:text-white text-base border-t dark:border-gray-700 pt-2 mt-1">
              <span>Total</span>
              <span id="summary-total" class="text-green-600">-</span>
            </div>
          </div>

          <button id="btn-checkout-submit" onclick="submitCheckout()" disabled
            class="mt-5 w-full bg-green-600 hover:bg-green-700 disabled:bg-gray-300 dark:disabled:bg-gray-600 disabled:cursor-not-allowed text-white font-semibold py-3 rounded-xl transition text-sm">
            Lanjut ke Pembayaran →
          </button>
          <p id="ship-warning" class="text-xs text-center text-orange-500 mt-2 hidden">Pilih kurir pengiriman terlebih dahulu</p>
          <a href="cart.html" class="mt-2 block w-full text-center text-green-600 hover:underline text-sm">← Kembali ke Keranjang</a>
        </div>
      </div>

    </div>
  </main>

  <script src="js/utils.js"></script>
  <script src="js/auth.js"></script>
  <script src="js/products.js"></script>
  <script src="js/shipping.js"></script>
  <script src="js/checkout.js"></script>
  <script>
    initCheckout();
    document.getElementById('dark-toggle').textContent = Utils.isDark() ? '☀️' : '🌙';
  </script>
</body>
</html>
