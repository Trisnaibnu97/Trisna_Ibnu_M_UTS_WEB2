<!DOCTYPE html>
<html lang="id" class="">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Bang IB Shop - Admin Login</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script>tailwind.config = { darkMode: 'class' }</script>
</head>
<body class="min-h-screen bg-gradient-to-br from-gray-900 to-gray-800 flex items-center justify-center p-4">

  <div class="w-full max-w-sm">
    <div class="text-center mb-8">
      <div class="text-5xl mb-3">🔐</div>
      <h1 class="text-2xl font-extrabold text-white">Admin Panel</h1>
      <p class="text-gray-400 text-sm mt-1">Bang IB Shop</p>
    </div>

    <div class="bg-gray-800 border border-gray-700 rounded-2xl p-8 shadow-2xl">
      <form id="admin-login-form" class="space-y-4">
        <div>
          <label class="block text-sm font-medium text-gray-300 mb-1">Email Admin</label>
          <input id="email" type="email" required value="admin@bangibshop.com"
            class="w-full px-4 py-3 rounded-xl bg-gray-700 border border-gray-600 text-white focus:outline-none focus:ring-2 focus:ring-green-500 transition">
        </div>
        <div>
          <label class="block text-sm font-medium text-gray-300 mb-1">Password</label>
          <input id="password" type="password" required value="admin123"
            class="w-full px-4 py-3 rounded-xl bg-gray-700 border border-gray-600 text-white focus:outline-none focus:ring-2 focus:ring-green-500 transition">
        </div>
        <button type="submit"
          class="w-full bg-green-600 hover:bg-green-700 text-white font-semibold py-3 rounded-xl transition">
          Masuk sebagai Admin
        </button>
      </form>
      <p class="text-center text-xs text-gray-500 mt-4">Default: admin@bangibshop.com / admin123</p>
    </div>

    <div class="text-center mt-4">
      <a href="index.html" class="text-gray-400 hover:text-white text-sm transition">← Kembali ke Toko</a>
    </div>
  </div>

  <script src="js/utils.js"></script>
  <script src="js/admin.js"></script>
  <script>
    Utils.applyDark();
    if (Admin.isLoggedIn()) window.location.href = 'admin.html';

    document.getElementById('admin-login-form').addEventListener('submit', e => {
      e.preventDefault();
      const ok = Admin.login(
        document.getElementById('email').value,
        document.getElementById('password').value
      );
      if (ok) {
        Utils.showToast('Selamat datang, Admin!', 'success');
        setTimeout(() => window.location.href = 'admin.html', 700);
      } else {
        Utils.showToast('Email atau password salah.', 'error');
      }
    });
  </script>
</body>
</html>
